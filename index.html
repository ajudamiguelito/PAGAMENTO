<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TNP MOB - Pagamento</title>
  <style>
    /* Estilos de Layout Base */
    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }

    .container {
      width: 90%;
      max-width: 400px;
      text-align: center;
    }

    .card {
      background: #1e293b;
      padding: 30px;
      border-radius: 24px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.6);
      border: 1px solid #334155;
      min-height: 420px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      position: relative;
    }

    h1 { font-size: 22px; margin-bottom: 10px; color: #f8fafc; }

    /* Input de Valor Estilizado */
    #valorInput {
      width: 100%;
      padding: 20px 0;
      border-radius: 16px;
      border: 2px solid #334155;
      background: #0f172a;
      color: #22c55e;
      font-size: 36px;
      font-weight: bold;
      text-align: center;
      margin: 15px 0;
      outline: none;
      transition: border-color 0.3s;
    }
    #valorInput:focus { border-color: #22c55e; }

    /* Remove setas do input */
    input::-webkit-outer-spin-button,
    input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }

    .status {
      margin: 20px 0;
      font-size: 17px;
      min-height: 50px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #94a3b8;
    }

    /* Botão Principal */
    button {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 14px;
      background: #22c55e;
      color: white;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(34, 197, 94, 0.3);
    }
    button:hover { background: #16a34a; transform: translateY(-2px); }
    button:disabled { background: #475569; cursor: not-allowed; transform: none; }

    /* Loading Spinner */
    .loading {
      margin-top: 15px;
      font-size: 13px;
      color: #94a3b8;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .spinner {
      width: 14px;
      height: 14px;
      border: 2px solid #334155;
      border-top-color: #22c55e;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Tela de Sucesso */
    #telaSucesso {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      animation: fadeIn 0.4s ease-out;
    }
    .check-icon {
      font-size: 70px;
      margin-bottom: 15px;
      animation: scaleIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    @keyframes scaleIn { from { transform: scale(0); } to { transform: scale(1); } }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    .link-pagamento {
      margin-top: 20px;
      padding: 12px;
      background: #0f172a;
      border-radius: 10px;
      font-size: 13px;
    }
    .link-pagamento a { color: #22c55e; text-decoration: none; font-weight: bold; }
    .info-texto { font-size: 11px; color: #64748b; margin-top: 20px; }
  </style>
</head>
<body>

<div class="container">
  <div class="card">
    
    <div id="conteudoPagamento">
      <h1>TNP MOB</h1>
      <input id="valorInput" type="tel" value="0,00" oninput="formatarMoeda(this)">

      <div id="status" class="status">Aguardando início...</div>

      <button id="btnPagar" onclick="abrirPagamento()">Gerar Pagamento</button>

      <div id="loading" class="loading"></div>

      <div id="linkPagamento" class="link-pagamento" style="display: none;">
        <a id="linkPagamentoHref" href="#" target="_blank">Clique aqui se a janela não abriu</a>
      </div>
    </div>

    <div id="telaSucesso">
      <div class="check-icon">✅</div>
      <h2 style="color: #f8fafc; margin: 0;">Aprovado!</h2>
      <p style="color: #94a3b8; font-size: 14px; margin: 10px 0;">Pagamento recebido com sucesso.</p>
      <div id="timerVolta" style="color: #22c55e; font-size: 12px; margin-top: 20px; font-weight: bold;">
        Reiniciando em 5s...
      </div>
    </div>

    <p class="info-texto" id="rodape">Segurança processada por TNP MOB</p>
  </div>
</div>

<script>
// --- CONFIGURAÇÃO ---
const URL_WEB_APP = "SUA_URL_AQUI";
const KEY = "SUA_CHAVE_AQUI";

let pagamentoId = localStorage.getItem("pagamentoId");
let abaPagamento = null;
let intervaloVerificacao = null;

// --- MÁSCARA DE MOEDA (Não inverte os números) ---
function formatarMoeda(input) {
  let valor = input.value.replace(/\D/g, "");
  if (!valor) valor = "0";
  valor = (parseInt(valor) / 100).toFixed(2).replace(".", ",");
  valor = valor.replace(/(\d)(?=(\d{3})+(?!\d))/g, "$1.");
  input.value = valor;

  // Garante que o cursor fique no final
  setTimeout(() => {
    input.setSelectionRange(input.value.length, input.value.length);
  }, 1);
}

// --- ABRIR JANELA SOBREPOSTA ---
async function abrirPagamento() {
  const btn = document.getElementById("btnPagar");
  const valorRaw = document.getElementById("valorInput").value;
  const valorNumerico = parseFloat(valorRaw.replace(/\./g, "").replace(",", "."));

  if (!valorNumerico || valorNumerico <= 0) return;

  btn.disabled = true;
  document.getElementById("status").innerText = "Conectando...";
  exibirLoading("Gerando link seguro...");

  // Centraliza a janela pop-up
  const w = 450; const h = 650;
  const left = (screen.width/2)-(w/2);
  const top = (screen.height/2)-(h/2);
  
  abaPagamento = window.open("", "PagamentoTNP", `width=${w},height=${h},top=${top},left=${left}`);

  try {
    const resposta = await fetch(URL_WEB_APP, {
      method: "POST",
      body: JSON.stringify({ action: "criar", key: KEY, value: valorNumerico, title: "Venda TNP MOB" })
    });
    const dados = await resposta.json();

    if (dados && dados.url) {
      pagamentoId = dados.id;
      localStorage.setItem("pagamentoId", pagamentoId);
      
      abaPagamento.location.href = dados.url;
      document.getElementById("linkPagamento").style.display = "block";
      document.getElementById("linkPagamentoHref").href = dados.url;
      document.getElementById("status").innerText = "Aguardando pagamento...";
      
      iniciarVerificacao();
    }
  } catch (e) {
    btn.disabled = false;
    if (abaPagamento) abaPagamento.close();
    document.getElementById("status").innerText = "Erro na conexão ❌";
  }
}

function iniciarVerificacao() {
  if (intervaloVerificacao) clearInterval(intervaloVerificacao);
  intervaloVerificacao = setInterval(verificarStatus, 5000);
}

// --- VERIFICAÇÃO COM SOM E TRANSIÇÃO ---
async function verificarStatus() {
  if (!pagamentoId) return;
  try {
    const resposta = await fetch(`${URL_WEB_APP}?action=status&id=${pagamentoId}&key=${KEY}`);
    const dados = await resposta.json();

    if (dados.status === "APROVADO") {
      clearInterval(intervaloVerificacao);
      
      // Som de Sucesso (Caixa Registradora)
      try {
        new Audio("https://www.myinstants.com/media/sounds/cash-register-purchase.mp3").play();
      } catch(e) {}

      localStorage.removeItem("pagamentoId");
      if (abaPagamento) abaPagamento.close();
      exibirSucessoFinal();
    }
  } catch (e) { console.log("Verificando..."); }
}

function exibirSucessoFinal() {
  document.getElementById("conteudoPagamento").style.display = "none";
  document.getElementById("rodape").style.display = "none";
  document.getElementById("telaSucesso").style.display = "flex";

  let tempo = 5;
  const cron = setInterval(() => {
    tempo--;
    document.getElementById("timerVolta").innerText = `Reiniciando em ${tempo}s...`;
    if (tempo <= 0) {
      clearInterval(cron);
      location.reload(); // Reseta tudo para a próxima venda
    }
  }, 1000);
}

function exibirLoading(texto) {
  document.getElementById("loading").innerHTML = texto ? `<div class="spinner"></div> ${texto}` : "";
}
</script>

</body>
</html>
